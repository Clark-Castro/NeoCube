<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neo-Cube 3D</title>
    <style>
      :root {
        --bg: #05070a;
        --panel: rgba(30, 41, 59, 0.7);
        --accent: #6366f1;
        --border: rgba(255, 255, 255, 0.1);
      }
      body {
        margin: 0;
        background: radial-gradient(circle at center, #111827 0%, #05070a 100%);
        color: white;
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
        user-select: none;
      }
      .scene {
        width: 100vw;
        height: 60vh;
        perspective: 1500px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: grab;
      }
      .scene:active {
        cursor: grabbing;
      }

      #cube {
        position: relative;
        width: 0;
        height: 0;
        transform-style: preserve-3d;
        transform: rotateX(-25deg) rotateY(-35deg);
      }
      .cubie {
        position: absolute;
        width: 60px;
        height: 60px;
        transform-style: preserve-3d;
        margin: -30px;
        will-change: transform;
      }
      .face {
        position: absolute;
        width: 60px;
        height: 60px;
        background: #0f172a;
        border: 2px solid #000;
        border-radius: 12px;
        backface-visibility: hidden;
        box-sizing: border-box;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
      }

      .face::after {
        content: "";
        position: absolute;
        top: 4px;
        left: 4px;
        right: 4px;
        bottom: 4px;
        border-radius: 8px;
        opacity: 0.9;
      }

      .u::after {
        background: #f8fafc;
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
      }
      .d::after {
        background: #fbbf24;
        box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
      }
      .l::after {
        background: #f97316;
        box-shadow: 0 0 15px rgba(249, 115, 22, 0.2);
      }
      .r::after {
        background: #ef4444;
        box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
      }
      .f::after {
        background: #22c55e;
        box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
      }
      .b::after {
        background: #2563eb;
        box-shadow: 0 0 15px rgba(37, 99, 235, 0.2);
      }

      .face-front {
        transform: rotateY(0deg) translateZ(30px);
      }
      .face-back {
        transform: rotateY(180deg) translateZ(30px);
      }
      .face-right {
        transform: rotateY(90deg) translateZ(30px);
      }
      .face-left {
        transform: rotateY(-90deg) translateZ(30px);
      }
      .face-top {
        transform: rotateX(90deg) translateZ(30px);
      }
      .face-bottom {
        transform: rotateX(-90deg) translateZ(30px);
      }

      .ui {
        position: absolute;
        bottom: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 24px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 8px;
      }
      button {
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #334155;
        color: white;
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      }
      button:hover {
        background: var(--accent);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
      }
      button:active {
        transform: translateY(0);
      }

      .special {
        display: flex;
        gap: 12px;
        width: 100%;
      }
      .special button {
        flex: 1;
        padding: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.8rem;
      }
      .solve {
        background: #059669;
        border: none;
      }
      .solve:hover {
        background: #10b981;
        box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
      }

      .scramble {
        background: #4f46e5;
        border: none;
      }

      h1 {
        margin: 0;
        padding-top: 40px;
        font-weight: 200;
        letter-spacing: 12px;
        color: rgba(255, 255, 255, 0.9);
        text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
      }
      .hint {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        opacity: 0.4;
      }
    </style>
  </head>
  <body>
    <h1>NEOCUBE</h1>
    <div class="hint">Kociemba Algorithm Integrated</div>

    <div class="scene" id="scene">
      <div id="cube"></div>
    </div>

    <div class="ui">
      <div class="controls">
        <button onclick="queueMove('U')">U</button>
        <button onclick="queueMove('D')">D</button>
        <button onclick="queueMove('L')">L</button>
        <button onclick="queueMove('R')">R</button>
        <button onclick="queueMove('F')">F</button>
        <button onclick="queueMove('B')">B</button>
        <button onclick="queueMove('U', true)">U'</button>
        <button onclick="queueMove('D', true)">D'</button>
        <button onclick="queueMove('L', true)">L'</button>
        <button onclick="queueMove('R', true)">R'</button>
        <button onclick="queueMove('F', true)">F'</button>
        <button onclick="queueMove('B', true)">B'</button>
      </div>
      <div class="special">
        <button class="scramble" onclick="scramble()">Scramble</button>
        <button class="solve" onclick="godSolve()">God Solve</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/cubejs@1.3.1/lib/cube.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cubejs@1.3.1/lib/solve.js"></script>

    <script>
      const cubeEl = document.getElementById("cube");
      const cubies = [];
      let isAnimating = false;
      let moveQueue = [];
      let moveHistory = [];

      function init() {
        for (let x = -1; x <= 1; x++) {
          for (let y = -1; y <= 1; y++) {
            for (let z = -1; z <= 1; z++) {
              if (x === 0 && y === 0 && z === 0) continue;
              const el = document.createElement("div");
              el.className = "cubie";
              el.innerHTML = `
                <div class="face face-front ${z == 1 ? "f" : ""}"></div>
                <div class="face face-back ${z == -1 ? "b" : ""}"></div>
                <div class="face face-right ${x == 1 ? "r" : ""}"></div>
                <div class="face face-left ${x == -1 ? "l" : ""}"></div>
                <div class="face face-top ${y == -1 ? "u" : ""}"></div>
                <div class="face face-bottom ${y == 1 ? "d" : ""}"></div>
              `;
              el.matrix = new DOMMatrix().translate(x * 61, y * 61, z * 61);
              el.style.transform = el.matrix.toString();
              cubeEl.appendChild(el);
              cubies.push(el);
            }
          }
        }
        if (window.Cube) Cube.initSolver();
      }

      function queueMove(face, isPrime = false, track = true) {
        if (track) moveHistory.push(isPrime ? face + "'" : face);
        moveQueue.push({ face, isPrime });
        if (!isAnimating) processQueue();
      }

      async function processQueue() {
        if (moveQueue.length === 0) {
          isAnimating = false;
          return;
        }
        isAnimating = true;
        const { face, isPrime } = moveQueue.shift();
        const axisMap = {
          U: { axis: "y", val: -61, rot: "rotateY", dir: -1 },
          D: { axis: "y", val: 61, rot: "rotateY", dir: 1 },
          L: { axis: "x", val: -61, rot: "rotateX", dir: -1 },
          R: { axis: "x", val: 61, rot: "rotateX", dir: 1 },
          F: { axis: "z", val: 61, rot: "rotateZ", dir: 1 },
          B: { axis: "z", val: -61, rot: "rotateZ", dir: -1 },
        };
        const config = axisMap[face];
        const angle = 90 * config.dir * (isPrime ? -1 : 1);
        const targets = cubies.filter(
          (c) =>
            Math.round(c.matrix[`m4${"xyz".indexOf(config.axis) + 1}`]) ===
            config.val,
        );

        const duration = moveQueue.length > 5 ? 60 : 250;
        const rotationMatrix = new DOMMatrix();
        if (config.rot === "rotateX") rotationMatrix.rotateSelf(angle, 0, 0);
        if (config.rot === "rotateY") rotationMatrix.rotateSelf(0, angle, 0);
        if (config.rot === "rotateZ") rotationMatrix.rotateSelf(0, 0, angle);

        targets.forEach((c) => {
          c.style.transition = `transform ${duration}ms cubic-bezier(0.4, 0, 0.2, 1)`;
          const nextMatrix = rotationMatrix.multiply(c.matrix);
          c.style.transform = nextMatrix.toString();
        });

        await new Promise((r) => setTimeout(r, duration));
        targets.forEach((c) => {
          c.style.transition = "none";
          c.matrix = rotationMatrix.multiply(c.matrix);
          c.style.transform = c.matrix.toString();
        });
        processQueue();
      }

      function scramble() {
        const moves = ["U", "D", "L", "R", "F", "B"];
        for (let i = 0; i < 20; i++)
          queueMove(moves[Math.floor(Math.random() * 6)], Math.random() > 0.5);
      }

      function godSolve() {
        if (moveHistory.length === 0) return;
        const c = new Cube();
        c.move(moveHistory.join(" "));
        const solution = c.solve();
        moveHistory = [];
        solution
          .split(" ")
          .filter((m) => m)
          .forEach((m) => {
            const face = m[0];
            const isPrime = m.includes("'");
            const isDouble = m.includes("2");
            queueMove(face, isPrime, false);
            if (isDouble) queueMove(face, isPrime, false);
          });
      }

      let rx = -25,
        ry = -35;
      document.onmousedown = (e) => {
        if (e.target.tagName === "BUTTON") return;
        const sX = e.pageX,
          sY = e.pageY,
          sRx = rx,
          sRy = ry;
        document.onmousemove = (ev) => {
          ry = sRy + (ev.pageX - sX) * 0.5;
          rx = sRx - (ev.pageY - sY) * 0.5;
          cubeEl.style.transform = `rotateX(${rx}deg) rotateY(${ry}deg)`;
        };
        document.onmouseup = () => (document.onmousemove = null);
      };

      init();

      document.addEventListener("keydown", (e) => {
        if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA")
          return;

        const key = e.key.toUpperCase();
        const isPrime = e.shiftKey;
        const validMoves = ["U", "D", "L", "R", "F", "B"];

        if (validMoves.includes(key)) {
          queueMove(key, isPrime);

          const btnText = isPrime ? `${key}'` : key;
          const btns = document.querySelectorAll(".controls button");
          btns.forEach((btn) => {
            if (btn.innerText === btnText) {
              btn.style.background = "var(--accent)";
              btn.style.transform = "translateY(2px)";
              setTimeout(() => {
                btn.style.background = "";
                btn.style.transform = "";
              }, 150);
            }
          });
        }

        if (key === "S") scramble();
        if (key === "ENTER" || key === "G") godSolve();
      });
    </script>
  </body>
</html>
